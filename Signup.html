<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Voxer AI | Registration</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f8fafc; height: 100vh; display: flex; align-items: center; justify-content: center; font-family: sans-serif; }
        .auth-card { background: #fff; width: 100%; max-width: 400px; padding: 40px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .form-floating { margin-bottom: 15px; }
        .form-control { border-radius: 12px; height: 60px; border: 1.5px solid #e2e8f0; }
        .form-control:focus { border-color: #000; box-shadow: none; }
        .form-floating > .form-control:focus ~ label,
        .form-floating > .form-control:not(:placeholder-shown) ~ label {
            background: white; padding: 0 8px; transform: scale(.85) translateY(-1.3rem) translateX(.15rem); color: #000; font-weight: bold; opacity: 1;
        }
        .btn-reg { background: #000; color: #fff; border: none; width: 100%; padding: 16px; border-radius: 14px; font-weight: 700; }
    </style>
</head>
<body>

<div class="auth-card">
    <h2 class="text-center fw-bold mb-4">VOXER AI</h2>
    <form id="signupForm" autocomplete="off">
        <div class="form-floating">
            <input type="text" class="form-control" id="f_name" placeholder=" " required>
            <label>Full Name</label>
        </div>
        <div class="form-floating">
            <input type="email" class="form-control" id="email" placeholder=" " required>
            <label>Email Address</label>
        </div>
        <div class="form-floating">
            <input type="text" class="form-control" id="mobile" placeholder=" " required>
            <label>Mobile Number</label>
        </div>
        <div class="form-floating">
            <input type="text" class="form-control" id="user_id" placeholder=" " required>
            <label>Username</label>
        </div>
        <div class="form-floating">
            <input type="password" class="form-control" id="pass_id" placeholder=" " required>
            <label>Password</label>
        </div>
        <button type="button" id="subBtn" onclick="handleSignup()" class="btn-reg">Create Account</button>
    </form>
</div>

<script>
async function handleSignup() {
    const btn = document.getElementById('subBtn');
    
    // YAHAN FIX HAI: Keys must be 'username' and 'password'
    const payload = {
        full_name: document.getElementById('f_name').value.trim(),
        email: document.getElementById('email').value.trim(),
        mobile: document.getElementById('mobile').value.trim(),
        username: document.getElementById('user_id').value.trim(), 
        password: document.getElementById('pass_id').value.trim()
    };

    if (!payload.username || !payload.password || !payload.full_name) {
        Swal.fire({ icon: 'warning', title: 'Khali Box!', text: 'Sary fields bharna lazmi hain!' });
        return;
    }

    btn.disabled = true;
    btn.innerHTML = "Saving to MySQL...";

    try {
        const response = await fetch('http://127.0.0.1:8080/signup', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });

        const data = await response.json();

        if (response.ok) {
            Swal.fire({ icon: 'success', title: 'Mubarak ho!', text: 'Account MySQL mein save hogya!', confirmButtonColor: '#000' })
            .then(() => { 
                document.getElementById('signupForm').reset(); 
                window.location.href = 'login.html'; 
            });
        } else {
            // Error Parsing Fix
            let errorText = data.detail;
            if (Array.isArray(data.detail)) {
                errorText = data.detail[0].msg; // Agar validation error array hai
            }
            Swal.fire({ icon: 'error', title: 'Alert', text: errorText, confirmButtonColor: '#000' });
        }
    } catch (e) {
        Swal.fire({ icon: 'error', title: 'Server Error', text: 'Backend off hai bhai!' });
    } finally {
        btn.disabled = false;
        btn.innerHTML = "Create Account";
    }
}
</script>
</body>
</html>
