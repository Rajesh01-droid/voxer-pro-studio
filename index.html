<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEURAL STUDIO | Next-Gen AI</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');

:root{
    --bg:#07080a;
    --card:rgba(20,22,28,0.7);
    --border:#2a2d35;
    --glow:#00ff88;
    --text:#eaeaea;
}

/* Base */
body{
    margin:0;
    font-family:'Plus Jakarta Sans', sans-serif;
    background: radial-gradient(circle at top right,#14161c,#07080a);
    color:var(--text);
}

/* Wrapper */
.main-wrapper{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
}

/* Card */
.studio-card{
    width:100%;
    max-width:750px;
    padding:30px;
    border-radius:28px;
    background:var(--card);
    backdrop-filter: blur(20px);
    border:1px solid var(--border);
    box-shadow:0 40px 80px rgba(0,0,0,0.6);
    position:relative;
}

/* Glow border */
.studio-card::before{
    content:'';
    position:absolute;
    inset:0;
    border-radius:28px;
    padding:1px;
    background:linear-gradient(120deg,transparent,var(--glow),transparent);
    -webkit-mask:
        linear-gradient(#000 0 0) content-box,
        linear-gradient(#000 0 0);
    -webkit-mask-composite:xor;
    opacity:.2;
}

/* Title */
.neural-title{
    font-weight:800;
    font-size:clamp(1.7rem,5vw,2.3rem);
    color:var(--glow);
    letter-spacing:-1px;
}

/* Toggle */
.toggle-container{
    display:flex;
    gap:5px;
    padding:5px;
    border-radius:14px;
    background:#000;
    border:1px solid #222;
}

.t-btn{
    flex:1;
    border:none;
    background:transparent;
    color:#666;
    padding:10px;
    border-radius:10px;
    font-weight:600;
    transition:0.3s;
}

.t-btn.active{
    background:#fff;
    color:#000;
}

/* Input */
.script-input{
    width:100%;
    height:140px;
    background:transparent;
    border:none;
    border-bottom:1px solid var(--border);
    color:#fff;
    font-size:1.05rem;
    outline:none;
    resize:none;
}

/* Button */
.gen-btn{
    width:100%;
    padding:16px;
    border:none;
    border-radius:14px;
    font-weight:800;
    background:linear-gradient(135deg,#00ff88,#00cc6a);
    color:#000;
    margin-top:20px;
    transition:0.3s;
}

.gen-btn:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 25px rgba(0,255,136,0.2);
}

/* Result */
.result-overlay{
    margin-top:20px;
    padding:14px;
    border-radius:14px;
    display:none;
    align-items:center;
    gap:12px;
    border:1px solid rgba(0,255,136,0.3);
    background:rgba(0,0,0,0.4);
    backdrop-filter:blur(10px);
    flex-wrap:wrap;
}

/* Audio */
audio{
    filter:invert(1);
}

/* Download button */
.dl-btn{
    width:38px;
    height:38px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#fff;
    color:#000;
}

/* Mobile */
@media(max-width:576px){
    .studio-card{padding:20px;}
    .script-input{height:120px;}
}
</style>
</head>

<body>

<div class="main-wrapper">
<div class="studio-card">

<div class="text-center mb-4">
    <div class="neural-title">NEURAL STUDIO</div>
    <p class="text-muted small">Crystal Clear AI Voice Machine</p>
</div>

<div class="row g-2">
    <div class="col-6">
        <div class="toggle-container" id="lGrp">
            <button class="t-btn active" onclick="sw(this,'lGrp')" data-v="English">English</button>
            <button class="t-btn" onclick="sw(this,'lGrp')" data-v="Hindi">Urdu / Hindi</button>
        </div>
    </div>

    <div class="col-6">
        <div class="toggle-container" id="gGrp">
            <button class="t-btn active" onclick="sw(this,'gGrp')" data-v="m">Male</button>
            <button class="t-btn" onclick="sw(this,'gGrp')" data-v="f">Female</button>
        </div>
    </div>
</div>

<div class="mt-4">
<textarea id="txt" class="script-input" placeholder="Type Roman Urdu (e.g., 'Kese ho bhai?')..."></textarea>
</div>

<button id="mainBtn" class="gen-btn" onclick="run()">GENERATE CRYSTAL VOICE</button>

<div id="resBox" class="result-overlay">
    <div class="flex-grow-1" style="min-width:200px;">
        <audio id="aud" controls class="w-100"></audio>
    </div>
    <a id="dl" href="#" download class="dl-btn">
        <i class="fa-solid fa-download"></i>
    </a>
</div>

</div>
</div>

<script>
function sw(b,p){
    document.getElementById(p).querySelectorAll('.t-btn').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
}

async function run(){
    const text=document.getElementById('txt').value.trim();
    const lang=document.querySelector('#lGrp .active').getAttribute('data-v');
    const gender=document.querySelector('#gGrp .active').getAttribute('data-v');

    if(!text) return;

    const btn=document.getElementById('mainBtn');
    btn.disabled=true;
    btn.innerText="TUNING NEURAL AUDIO...";

    try{
        const r=await fetch('/api/generate',{
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify({text,voice_group:lang,gender})
        });

        const d=await r.json();

        if(d.url){
            document.getElementById('resBox').style.display='flex';
            const a=document.getElementById('aud');
            a.src=d.url;
            document.getElementById('dl').href=d.url;
            a.play();
        }

    }catch(e){
        alert("Error");
    }finally{
        btn.disabled=false;
        btn.innerText="GENERATE CRYSTAL VOICE";
    }
}
</script>

</body>
</html>
