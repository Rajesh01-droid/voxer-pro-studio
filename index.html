<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEURAL STUDIO | Next-Gen AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap');
        
        :root { --glow: #00ff88; --bg: #08090a; --card: #111216; }
        
        /* Scroll Khatam karne ke liye */
        html, body { height: 100%; overflow: hidden; background: var(--bg); color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; }

        .main-wrapper { 
            height: 100vh; display: flex; align-items: center; justify-content: center; 
            padding: 20px; background: radial-gradient(circle at top right, #1a1c20, #08090a);
        }

        .studio-card { 
            background: var(--card); border: 1px solid #222; border-radius: 35px; 
            padding: 40px; width: 100%; max-width: 750px; position: relative;
            box-shadow: 0 40px 100px rgba(0,0,0,0.6);
        }

        .neural-title { font-weight: 800; font-size: 2.2rem; color: var(--glow); letter-spacing: -1.5px; margin-bottom: 5px; }
        
        .toggle-container { background: #000; padding: 6px; border-radius: 20px; display: flex; gap: 5px; border: 1px solid #333; }
        .t-btn { flex: 1; border: none; background: transparent; color: #666; padding: 12px; border-radius: 15px; font-weight: 700; font-size: 0.85rem; transition: 0.3s; }
        .t-btn.active { background: #fff; color: #000; box-shadow: 0 5px 15px rgba(255,255,255,0.1); }

        .input-zone { margin-top: 30px; position: relative; }
        .script-input { 
            background: transparent; border: none; color: #fff; font-size: 1.3rem; 
            height: 180px; width: 100%; outline: none; resize: none;
            line-height: 1.5; border-bottom: 1px solid #333;
        }

        .gen-btn { 
            background: var(--glow); color: #000; width: 100%; padding: 20px; 
            border-radius: 18px; font-weight: 800; border: none; font-size: 1.1rem;
            margin-top: 25px; transition: 0.4s;
        }
        .gen-btn:hover { transform: scale(1.02); box-shadow: 0 0 40px rgba(0,255,136,0.3); }

        /* Compact Result Area */
        .result-overlay { 
            background: #1a1c22; border-radius: 20px; padding: 15px 25px; 
            margin-top: 20px; display: none; align-items: center; gap: 15px;
            border: 1px solid var(--glow);
        }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="studio-card">
        <div class="text-center mb-4">
            <div class="neural-title">NEURAL STUDIO</div>
            <p class="text-muted small">Crystal Clear AI Voice Machine</p>
        </div>

        <div class="row g-3">
            <div class="col-6">
                <div class="toggle-container" id="lGrp">
                    <button class="t-btn active" onclick="sw(this, 'lGrp')" data-v="English">English</button>
                    <button class="t-btn" onclick="sw(this, 'lGrp')" data-v="Hindi">Urdu / Hindi</button>
                </div>
            </div>
            <div class="col-6">
                <div class="toggle-container" id="gGrp">
                    <button class="t-btn active" onclick="sw(this, 'gGrp')" data-v="m">Male</button>
                    <button class="t-btn" onclick="sw(this, 'gGrp')" data-v="f">Female</button>
                </div>
            </div>
        </div>

        <div class="input-zone">
            <textarea id="txt" class="script-input" placeholder="Type Roman Urdu (e.g., 'Kese ho bhai?')..."></textarea>
        </div>

        <button id="mainBtn" class="gen-btn" onclick="run()">GENERATE CRYSTAL VOICE</button>

        <div id="resBox" class="result-overlay">
            <div class="flex-grow-1">
                <audio id="aud" controls class="w-100" style="filter: invert(1); height: 40px;"></audio>
            </div>
            <a id="dl" href="#" download class="btn btn-light btn-sm rounded-circle" style="width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;">
                <i class="fa-solid fa-download"></i>
            </a>
        </div>
    </div>
</div>

<script>
    function sw(b, p) {
        document.getElementById(p).querySelectorAll('.t-btn').forEach(x => x.classList.remove('active'));
        b.classList.add('active');
    }

    async function run() {
        const text = document.getElementById('txt').value.trim();
        const lang = document.querySelector('#lGrp .active').getAttribute('data-v');
        const gender = document.querySelector('#gGrp .active').getAttribute('data-v');

        if(!text) return;

        const btn = document.getElementById('mainBtn');
        btn.disabled = true;
        btn.innerText = "TUNING NEURAL AUDIO...";

        try {
            const r = await fetch('/api/generate', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({text, voice_group: lang, gender})
            });
            const d = await r.json();
            if(d.url) {
                document.getElementById('resBox').style.display = 'flex';
                const a = document.getElementById('aud');
                a.src = d.url;
                document.getElementById('dl').href = d.url;
                a.play();
            }
        } catch(e) {
            alert("Error");
        } finally {
            btn.disabled = false;
            btn.innerText = "GENERATE CRYSTAL VOICE";
        }
    }
</script>
</body>
</html>
