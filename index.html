<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOXER PRO | Studio Level AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/wavesurfer.js@7"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap');
        :root { --primary: #000; --bg: #fdfdfd; }
        body { background: var(--bg); font-family: 'Plus Jakarta Sans', sans-serif; }
        .studio-card { border-radius: 30px; border: 2px solid #000; padding: 40px; background: #fff; box-shadow: 20px 20px 0px #000; }
        .voice-pill { border: 2px solid #eee; padding: 15px; border-radius: 15px; cursor: pointer; font-weight: 700; transition: 0.3s; text-align: center; }
        .voice-pill.active { background: #000; color: #fff; border-color: #000; }
        .gen-btn { background: #000; color: #fff; padding: 20px; border-radius: 15px; font-weight: 800; width: 100%; border: none; margin-top: 20px; font-size: 1.2rem; }
        .wf-row { background: #f9f9f9; border-radius: 20px; padding: 20px; margin-bottom: 15px; }
    </style>
</head>
<body class="p-4">

<div class="container" style="max-width: 700px;">
    <div class="text-center mb-5">
        <h1 class="fw-800" style="font-weight: 900; letter-spacing: -2px;">NEURAL STUDIO</h1>
        <p class="text-muted">ElevenLabs Grade Voice Generation</p>
    </div>

    <div class="row g-3 mb-4">
        <div class="col-6">
            <div id="btn-en" class="voice-pill active" onclick="setLang('English')">🇺🇸 ENGLISH</div>
        </div>
        <div class="col-6">
            <div id="btn-hi" class="voice-pill" onclick="setLang('Hindi')">🇮🇳 HINDI / URDU</div>
        </div>
    </div>

    <div class="studio-card">
        <textarea id="scriptInput" class="form-control border-0 fs-4" style="min-height: 150px; outline: none; box-shadow: none;" placeholder="Enter script..."></textarea>
        <button id="mainBtn" class="gen-btn" onclick="generate()">GENERATE STUDIO VOICE</button>
    </div>
</div>

<script>
    let currentLang = "English";
    let globalMale = [], globalFemale = [];

    function setLang(l) {
        currentLang = l;
        document.getElementById('btn-en').classList.toggle('active', l === 'English');
        document.getElementById('btn-hi').classList.toggle('active', l === 'Hindi');
    }

    async function generate() {
        const text = document.getElementById('scriptInput').value.trim();
        if(!text) return Swal.fire('Error', 'Empty Text', 'error');

        const btn = document.getElementById('mainBtn');
        btn.innerText = "ENGINEERING VOICE...";
        btn.disabled = true;

        try {
            const res = await fetch('/api/generate', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({text: text, voice_group: currentLang})
            });
            const data = await res.json();
            
            globalMale = data.male_samples;
            globalFemale = data.female_samples;
            
            showOutput();
        } catch(e) {
            Swal.fire('Error', 'Server Timeout', 'error');
        } finally {
            btn.innerText = "GENERATE STUDIO VOICE";
            btn.disabled = false;
        }
    }

    function showOutput() {
        let html = `<div class="p-2 text-start">`;
        [...globalMale, ...globalFemale].forEach((s, i) => {
            html += `
            <div class="wf-row">
                <div class="d-flex justify-content-between align-items-center mb-2">
                    <span class="badge bg-dark">${s.style}</span>
                    <a href="${s.url}" download class="text-dark"><i class="fa-solid fa-download"></i></a>
                </div>
                <audio controls class="w-100"><source src="${s.url}" type="audio/mpeg"></audio>
            </div>`;
        });
        html += `</div>`;

        Swal.fire({
            title: 'STUDIO OUTPUT',
            html: html,
            showConfirmButton: false,
            width: '500px'
        });
    }
</script>
</body>
</html>
