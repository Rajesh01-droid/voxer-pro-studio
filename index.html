<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEURAL STUDIO PRO | Next-Gen AI</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        
        :root { 
            --glow: #00ff88; 
            --accent: #7000ff;
            --bg: #050608; 
            --card: rgba(17, 18, 22, 0.85); 
            --text: #ffffff;
            --input-bg: rgba(255, 255, 255, 0.04);
            --border: rgba(255, 255, 255, 0.1);
        }

        body.light-mode {
            --bg: #f0f4f8;
            --card: rgba(255, 255, 255, 0.9);
            --text: #0f172a;
            --glow: #059669;
            --accent: #6366f1;
            --input-bg: #f8fafc;
            --border: rgba(0, 0, 0, 0.08);
        }
        
        html, body { 
            min-height: 100%; 
            background: var(--bg); 
            color: var(--text); 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            transition: background 0.5s ease, color 0.5s ease;
            overflow-x: hidden;
            margin: 0;
        }

        .ambient-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
        }

        .blob {
            position: absolute;
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(0, 255, 136, 0.12) 0%, transparent 70%);
            filter: blur(80px);
            animation: move 25s infinite alternate;
        }

        @keyframes move { 0% { transform: translate(0, 0); } 100% { transform: translate(100px, 200px); } }

        .main-wrapper { 
            min-height: 100vh; 
            display: flex; align-items: center; justify-content: center; padding: 20px;
        }

        .studio-card { 
            background: var(--card); 
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--border); 
            border-radius: 40px; 
            padding: clamp(20px, 5vw, 45px); 
            width: 100%; max-width: 800px; 
            box-shadow: 0 50px 100px rgba(0,0,0,0.4);
            position: relative;
        }

        .theme-switch {
            position: absolute; top: 30px; right: 30px;
            cursor: pointer; width: 48px; height: 48px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 50%; background: var(--input-bg);
            border: 1px solid var(--border); transition: 0.3s;
        }

        .header-title { 
            font-weight: 800; font-size: clamp(1.8rem, 5vw, 2.8rem); 
            background: linear-gradient(90deg, var(--glow), var(--accent));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            letter-spacing: -2px;
        }

        .selector-box {
            background: var(--input-bg);
            border: 1px solid var(--border);
            padding: 6px; border-radius: 20px;
            display: flex; gap: 4px;
        }

        .sel-btn { 
            flex: 1; border: none; background: transparent; 
            color: #71717a; padding: 12px; border-radius: 15px; 
            font-weight: 700; font-size: 0.85rem; transition: 0.3s;
        }

        .sel-btn.active { background: var(--glow); color: #000; box-shadow: 0 8px 20px rgba(0, 255, 136, 0.25); }

        .input-container {
            margin-top: 30px; position: relative; background: var(--input-bg);
            border: 1px solid var(--border); border-radius: 30px; padding: 25px;
        }

        .script-input { 
            background: transparent; border: none; color: var(--text); 
            font-size: 1.15rem; min-height: 160px; width: 100%; outline: none; 
            resize: none;
        }

        /* --- SMART AI SCANNING BUTTON --- */
        .action-btn-container {
            margin-top: 35px;
            position: relative;
        }

        .action-btn { 
            position: relative;
            background: #0a0b0e;
            color: #fff; 
            width: 100%; 
            padding: 24px; 
            border-radius: 20px; 
            font-weight: 800; 
            border: 1px solid rgba(0, 255, 136, 0.3); 
            font-size: 1.15rem; 
            transition: 0.4s;
            letter-spacing: 2px;
            overflow: hidden;
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            cursor: pointer;
        }

        /* Scanning Wave Layer */
        .ai-wave {
            position: absolute;
            top: 0;
            left: -100%;
            width: 60%;
            height: 100%;
            background: linear-gradient(to right, transparent, rgba(0, 255, 136, 0.15), transparent);
            transform: skewX(-30deg);
            z-index: -1;
            display: none;
        }

        /* Active Processing State */
        .btn-loading {
            border-color: var(--glow) !important;
            box-shadow: 0 0 25px rgba(0, 255, 136, 0.2);
            color: var(--glow) !important;
            animation: pulse-border 2s infinite ease-in-out;
            pointer-events: none;
        }

        .btn-loading .ai-wave {
            display: block;
            animation: scanning 1.5s infinite linear;
        }

        @keyframes scanning {
            0% { left: -100%; }
            100% { left: 150%; }
        }

        @keyframes pulse-border {
            0%, 100% { border-color: rgba(0, 255, 136, 0.3); }
            50% { border-color: rgba(0, 255, 136, 1); box-shadow: 0 0 15px rgba(0, 255, 136, 0.3); }
        }

        /* Particles */
        .particle {
            position: absolute;
            background: var(--glow);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--glow);
            pointer-events: none;
        }

        .tool-dock { position: absolute; bottom: 15px; right: 15px; display: flex; gap: 8px; }
        .dock-btn { width: 42px; height: 42px; border-radius: 14px; border: 1px solid var(--border); background: var(--card); color: var(--text); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; }
        .dock-btn:hover { background: var(--accent); color: white; }
        .dock-btn.mic-on { background: #ef4444; border: none; animation: pulse 1.2s infinite; color: white; }
        
        #output { margin-top: 30px; background: rgba(0,0,0,0.15); border-radius: 25px; padding: 20px; display: none; border: 1px solid var(--glow); animation: fadeInUp 0.6s ease; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        audio { filter: invert(1) hue-rotate(180deg) brightness(1.2); height: 40px; }
        body.light-mode audio { filter: none; }
    </style>
</head>
<body>

<div class="ambient-bg">
    <div class="blob" style="top: -10%; right: -5%;"></div>
    <div class="blob" style="bottom: -10%; left: -5%; background: radial-gradient(circle, rgba(112, 0, 255, 0.08) 0%, transparent 70%);"></div>
</div>

<div class="main-wrapper">
    <div class="studio-card">
        <div class="theme-switch" onclick="toggleTheme()">
            <i class="fa-solid fa-moon" id="tIcon"></i>
        </div>

        <div class="text-center mb-5">
            <h1 class="header-title">NEURAL STUDIO</h1>
            <p class="text-muted fw-bold small">CRYSTAL CLEAR AI VOICE SYNTHESIS</p>
        </div>

        <div class="row g-3">
            <div class="col-md-6">
                <div class="selector-box" id="lBox">
                    <button class="sel-btn active" onclick="sel(this, 'lBox')" data-val="English">English</button>
                    <button class="sel-btn" onclick="sel(this, 'lBox')" data-val="Hindi">Hindhi/Urdu</button>
                </div>
            </div>
            <div class="col-md-6">
                <div class="selector-box" id="gBox">
                    <button class="sel-btn active" onclick="sel(this, 'gBox')" data-val="m"><i class="fa-solid fa-mars me-2"></i>Male</button>
                    <button class="sel-btn" onclick="sel(this, 'gBox')" data-val="f"><i class="fa-solid fa-venus me-2"></i>Female</button>
                </div>
            </div>
        </div>

        <div class="input-container">
            <textarea id="mainTxt" class="script-input" placeholder="Writings scripts... Neural pathways ready Boss!"></textarea>
            <div class="tool-dock">
                <button class="dock-btn" onclick="document.getElementById('mainTxt').value = ''" title="Clear"><i class="fa-solid fa-trash-can"></i></button>
                <button class="dock-btn" id="mic" onclick="startSpeech()" title="Speech to Text"><i class="fa-solid fa-microphone"></i></button>
            </div>
        </div>

        <div class="action-btn-container">
            <button id="genBtn" class="action-btn" onclick="generate()">
                <div class="ai-wave"></div>
                <div id="particleBox"></div>
                <i class="fa-solid fa-microchip-ai" id="btnIcon" style="color: var(--glow);"></i>
                <span id="btnLabel">START NEURAL PROCESS</span>
            </button>
        </div>

        <div id="output">
            <div class="d-flex align-items-center gap-3">
                <div class="flex-grow-1">
                    <audio id="player" controls class="w-100"></audio>
                </div>
                <a id="download" href="#" download class="dock-btn" style="background: var(--glow); color: #000; border: none; width: 50px; height: 50px;">
                    <i class="fa-solid fa-download fa-lg"></i>
                </a>
            </div>
        </div>
    </div>
</div>

<script>
    function toggleTheme() {
        document.body.classList.toggle('light-mode');
        const icon = document.getElementById('tIcon');
        icon.classList.toggle('fa-moon');
        icon.classList.toggle('fa-sun');
    }

    function sel(btn, containerId) {
        document.getElementById(containerId).querySelectorAll('.sel-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    function startSpeech() {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) return alert("Browser not supported!");
        const rec = new SpeechRecognition();
        const micBtn = document.getElementById('mic');
        rec.onstart = () => micBtn.classList.add('mic-on');
        rec.onend = () => micBtn.classList.remove('mic-on');
        rec.onresult = (e) => { document.getElementById('mainTxt').value += e.results[0][0].transcript; };
        rec.start();
    }

    async function generate() {
        const text = document.getElementById('mainTxt').value.trim();
        if(!text) return alert("Please enter a script to proceed.!");

        const btn = document.getElementById('genBtn');
        const label = document.getElementById('btnLabel');
        const icon = document.getElementById('btnIcon');
        const out = document.getElementById('output');
        
        btn.classList.add('btn-loading');
        label.innerText = 'PROCESSING DATA...';
        icon.className = 'fa-solid fa-sync fa-spin';
        out.style.display = 'none';
        
        const pInterval = setInterval(() => {
            const box = document.getElementById('particleBox');
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.left = Math.random() * 100 + '%';
            p.style.top = '100%';
            p.style.width = '3px'; p.style.height = '3px';
            box.appendChild(p);
            p.animate([{ transform: 'translateY(0)', opacity: 1 }, { transform: 'translateY(-60px)', opacity: 0 }], { duration: 1000 });
            setTimeout(() => p.remove(), 1000);
        }, 150);

        try {
            const res = await fetch('/api/generate', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    text,
                    voice_group: document.querySelector('#lBox .active').getAttribute('data-val'),
                    gender: document.querySelector('#gBox .active').getAttribute('data-val')
                })
            });
            const data = await res.json();
            if(data.url) {
                out.style.display = 'block';
                document.getElementById('player').src = data.url;
                document.getElementById('download').href = data.url;
                document.getElementById('player').play();
            }
        } catch (err) {
            alert("Error!");
        } finally {
            clearInterval(pInterval);
            btn.classList.remove('btn-loading');
            label.innerText = 'START NEURAL PROCESS';
            icon.className = 'fa-solid fa-microchip-ai';
        }
    }
</script>

</body>
</html>
