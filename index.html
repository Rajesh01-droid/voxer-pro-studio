<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEURAL STUDIO | Next-Gen AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap');
        
        :root { 
            --glow: #00ff88; 
            --bg: #08090a; 
            --card: #111216; 
            --text: #ffffff;
            --input-bg: rgba(255,255,255,0.03);
        }

        /* Light Mode Variables */
        body.light-mode {
            --bg: #f4f7f6;
            --card: #ffffff;
            --text: #1a1a1a;
            --glow: #00bd65;
            --input-bg: #f9f9f9;
        }
        
        html, body { 
            min-height: 100%; 
            background: var(--bg); 
            color: var(--text); 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            margin: 0; padding: 0;
        }

        .main-wrapper { 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 15px; 
            background: radial-gradient(circle at top right, rgba(0,255,136,0.08), transparent);
        }

        .studio-card { 
            background: var(--card); 
            border: 1px solid rgba(128,128,128,0.1); 
            border-radius: 35px; 
            padding: 35px; 
            width: 100%; 
            max-width: 700px; 
            position: relative;
            box-shadow: 0 40px 100px rgba(0,0,0,0.3);
        }

        /* Premium Theme Toggle */
        .theme-switch {
            position: absolute;
            top: 25px;
            right: 25px;
            cursor: pointer;
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: var(--input-bg);
            border: 1px solid rgba(128,128,128,0.2);
            transition: 0.3s;
        }

        .neural-title { 
            font-weight: 800; 
            font-size: 2.2rem; 
            color: var(--glow); 
            letter-spacing: -1.5px; 
            text-transform: uppercase;
        }
        
        .toggle-container { 
            background: var(--input-bg); 
            padding: 6px; 
            border-radius: 20px; 
            display: flex; 
            gap: 5px; 
            border: 1px solid rgba(128,128,128,0.1); 
        }

        .t-btn { 
            flex: 1; border: none; background: transparent; 
            color: #888; padding: 12px 5px; border-radius: 15px; 
            font-weight: 700; font-size: 0.85rem; transition: 0.3s;
        }

        .t-btn.active { 
            background: var(--glow); 
            color: #000; 
            box-shadow: 0 4px 15px rgba(0,255,136,0.2);
        }

        .input-zone { 
            margin-top: 25px; 
            position: relative; 
            background: var(--input-bg);
            border-radius: 20px;
            padding: 15px;
            border: 1px solid rgba(128,128,128,0.1);
        }
        
        .script-input { 
            background: transparent; border: none; color: var(--text); 
            font-size: 1.1rem; height: 130px; width: 100%; outline: none; 
            resize: none;
        }

        /* Mic Button Animation */
        .mic-btn {
            position: absolute;
            right: 15px;
            bottom: 15px;
            background: var(--card);
            border: 1px solid rgba(128,128,128,0.2);
            color: var(--glow);
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .mic-btn.recording { 
            background: #ff4757; 
            color: white; 
            animation: pulse-mic 1.5s infinite; 
            border: none;
        }
        @keyframes pulse-mic { 0% { box-shadow: 0 0 0 0 rgba(255,71,87,0.4); } 70% { box-shadow: 0 0 0 15px rgba(255,71,87,0); } 100% { box-shadow: 0 0 0 0 rgba(255,71,87,0); } }

        /* Premium AI Loader */
        .loader-box {
            display: none;
            text-align: center;
            padding: 20px 0;
        }
        .ai-pulse {
            display: flex;
            justify-content: center;
            gap: 6px;
            height: 40px;
            align-items: center;
        }
        .ai-pulse div {
            width: 4px;
            background: var(--glow);
            border-radius: 10px;
            animation: pulse-grow 1s ease-in-out infinite;
        }
        @keyframes pulse-grow { 0%, 100% { height: 10px; } 50% { height: 40px; } }

        /* Waveform for Playback */
        .waveform-visual {
            display: none;
            justify-content: center;
            align-items: center;
            gap: 4px;
            height: 50px;
            margin: 20px 0;
        }
        .wave-bar {
            width: 3px;
            height: 10px;
            background: var(--glow);
            border-radius: 4px;
        }
        .playing .wave-bar { animation: wave-anim 0.8s infinite ease-in-out; }
        @keyframes wave-anim { 0%, 100% { height: 10px; } 50% { height: 45px; } }

        .gen-btn { 
            background: var(--glow); color: #000; width: 100%; 
            padding: 20px; border-radius: 18px; font-weight: 800; 
            border: none; font-size: 1.1rem; margin-top: 25px; transition: 0.4s;
            letter-spacing: 1px;
        }

        .gen-btn:hover { transform: translateY(-3px); box-shadow: 0 10px 25px rgba(0,255,136,0.3); }
        .gen-btn:disabled { opacity: 0.6; transform: none; }

        .result-area { 
            background: var(--input-bg); border-radius: 20px; 
            padding: 15px 25px; margin-top: 25px; display: none; 
            align-items: center; gap: 15px; border: 1px solid var(--glow);
        }

        @media (max-width: 576px) {
            .studio-card { padding: 25px 20px; }
            .neural-title { font-size: 1.7rem; }
        }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="studio-card">
        <div class="theme-switch" onclick="toggleTheme()" title="Switch Theme">
            <i class="fa-solid fa-moon" id="themeIcon"></i>
        </div>

        <div class="text-center mb-5">
            <div class="neural-title">NEURAL STUDIO</div>
            <p class="text-muted small">Professional AI Audio Synthesis</p>
        </div>

        <div class="row g-3">
            <div class="col-md-6">
                <div class="toggle-container" id="lGrp">
                    <button class="t-btn active" onclick="sw(this, 'lGrp')" data-v="English">English</button>
                    <button class="t-btn" onclick="sw(this, 'lGrp')" data-v="Hindi">Urdu / Hindi</button>
                </div>
            </div>
            <div class="col-md-6">
                <div class="toggle-container" id="gGrp">
                    <button class="t-btn active" onclick="sw(this, 'gGrp')" data-v="m">Male</button>
                    <button class="t-btn" onclick="sw(this, 'gGrp')" data-v="f">Female</button>
                </div>
            </div>
        </div>

        <div class="input-zone">
            <textarea id="txt" class="script-input" placeholder="Writings scripts..."></textarea>
            <button class="mic-btn" id="micBtn" onclick="startVoiceInput()" title="Voice Typing">
                <i class="fa-solid fa-microphone"></i>
            </button>
        </div>

        <div id="loader" class="loader-box">
            <div class="ai-pulse">
                <div style="animation-delay: 0.1s"></div>
                <div style="animation-delay: 0.3s"></div>
                <div style="animation-delay: 0.5s"></div>
                <div style="animation-delay: 0.2s"></div>
                <div style="animation-delay: 0.4s"></div>
            </div>
            <small class="text-muted mt-3 d-block">Analyzing Neural Pathways...</small>
        </div>

        <button id="mainBtn" class="gen-btn" onclick="generateAudio()">GENERATE CRYSTAL VOICE</button>

        <div id="waveform" class="waveform-visual">
            <div class="wave-bar" style="animation-delay: 0.1s"></div>
            <div class="wave-bar" style="animation-delay: 0.3s"></div>
            <div class="wave-bar" style="animation-delay: 0.5s"></div>
            <div class="wave-bar" style="animation-delay: 0.2s"></div>
            <div class="wave-bar" style="animation-delay: 0.4s"></div>
            <div class="wave-bar" style="animation-delay: 0.6s"></div>
        </div>

        <div id="resBox" class="result-area">
            <div class="flex-grow-1">
                <audio id="aud" controls class="w-100" style="filter: invert(0.8); height: 35px;"></audio>
            </div>
            <a id="dl" href="#" download class="btn btn-dark btn-sm rounded-circle shadow-sm" style="width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; background: var(--text); color: var(--card);">
                <i class="fa-solid fa-download"></i>
            </a>
        </div>
    </div>
</div>

<script>
    // Theme Toggle Logic
    function toggleTheme() {
        document.body.classList.toggle('light-mode');
        const icon = document.getElementById('themeIcon');
        if(document.body.classList.contains('light-mode')) {
            icon.classList.replace('fa-moon', 'fa-sun');
        } else {
            icon.classList.replace('fa-sun', 'fa-moon');
        }
    }

    // Voice Typing (Speech to Text)
    function startVoiceInput() {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
            alert("Your browser does not support Speech Recognition.");
            return;
        }

        const recognition = new SpeechRecognition();
        const micBtn = document.getElementById('micBtn');
        const txt = document.getElementById('txt');

        recognition.onstart = () => micBtn.classList.add('recording');
        recognition.onend = () => micBtn.classList.remove('recording');
        
        recognition.onresult = (event) => {
            const transcript = event.results[0][0].transcript;
            txt.value += " " + transcript;
        };

        recognition.start();
    }

    function sw(b, p) {
        document.getElementById(p).querySelectorAll('.t-btn').forEach(x => x.classList.remove('active'));
        b.classList.add('active');
    }

    async function generateAudio() {
        const text = document.getElementById('txt').value.trim();
        const lang = document.querySelector('#lGrp .active').getAttribute('data-v');
        const gender = document.querySelector('#gGrp .active').getAttribute('data-v');

        if(!text) {
            alert("Please type something first!");
            return;
        }

        const btn = document.getElementById('mainBtn');
        const loader = document.getElementById('loader');
        const resBox = document.getElementById('resBox');
        const waveform = document.getElementById('waveform');
        
        // UI Reset
        btn.disabled = true;
        btn.innerText = "SYNTHESIZING...";
        loader.style.display = 'block';
        resBox.style.display = 'none';
        waveform.style.display = 'none';

        try {
            const response = await fetch('/api/generate', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({text, voice_group: lang, gender})
            });
            
            const data = await response.json();
            
            if(data.url) {
                const aud = document.getElementById('aud');
                aud.src = data.url;
                document.getElementById('dl').href = data.url;
                
                loader.style.display = 'none';
                resBox.style.display = 'flex';
                waveform.style.display = 'flex';
                
                // Sync waveform with audio playback
                aud.onplay = () => waveform.classList.add('playing');
                aud.onpause = () => waveform.classList.remove('playing');
                aud.play();
            }
        } catch(e) {
            alert("Network Error. Please try again.");
        } finally {
            btn.disabled = false;
            btn.innerText = "GENERATE CRYSTAL VOICE";
            loader.style.display = 'none';
        }
    }
</script>

</body>
</html>
