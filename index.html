<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEURAL STUDIO | Machine Learning Voice</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap');
        
        :root { --glow: #00ff88; --dark: #0a0a0a; --card: #141414; }
        body { background: var(--dark); color: #fff; font-family: 'Space Grotesk', sans-serif; }

        .header-main { padding: 40px 0; text-align: center; border-bottom: 1px solid #222; }
        .neural-title { font-weight: 700; font-size: 2.5rem; letter-spacing: -2px; color: var(--glow); text-shadow: 0 0 20px rgba(0,255,136,0.3); }

        .studio-card { 
            background: var(--card); border: 1px solid #333; border-radius: 30px; 
            padding: 30px; margin-top: -50px; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .toggle-box { background: #1a1a1a; padding: 10px; border-radius: 20px; display: flex; gap: 10px; border: 1px solid #333; }
        .toggle-btn { flex: 1; padding: 12px; border-radius: 15px; border: none; background: transparent; color: #888; font-weight: 600; transition: 0.3s; }
        .toggle-btn.active { background: #222; color: var(--glow); box-shadow: 0 0 15px rgba(0,255,136,0.1); }

        .script-area { 
            background: transparent; border: none; color: #fff; font-size: 1.4rem; 
            min-height: 200px; width: 100%; outline: none; resize: none; margin-top: 20px;
        }

        .generate-btn { 
            background: var(--glow); color: #000; width: 100%; padding: 20px; 
            border-radius: 20px; font-weight: 800; border: none; font-size: 1.2rem;
            transition: 0.3s; margin-top: 20px; letter-spacing: 1px;
        }
        .generate-btn:hover { transform: scale(1.02); box-shadow: 0 0 30px var(--glow); }
        .generate-btn:disabled { background: #333; color: #888; }

        .output-card { 
            background: #1a1a1a; border: 1px solid #333; border-radius: 20px; 
            padding: 20px; margin-top: 30px; display: none;
        }
    </style>
</head>
<body>

<div class="header-main">
    <div class="neural-title">NEURAL STUDIO AI</div>
    <p class="text-muted">High-Performance Machine Learning Audio Engine</p>
</div>

<div class="container" style="max-width: 800px; padding-bottom: 100px;">
    <div class="studio-card">
        <div class="row g-3">
            <div class="col-md-6">
                <label class="small text-muted mb-2">LANGUAGE ENGINE</label>
                <div class="toggle-box">
                    <button class="toggle-btn active" id="lang-en" onclick="setLang('English')">ENGLISH</button>
                    <button class="toggle-btn" id="lang-hi" onclick="setLang('Hindi')">URDU / HINDI</button>
                </div>
            </div>
            <div class="col-md-6">
                <label class="small text-muted mb-2">NEURAL GENDER</label>
                <div class="toggle-box">
                    <button class="toggle-btn active" id="gen-m" onclick="setGender('m')">MALE</button>
                    <button class="toggle-btn" id="gen-f" onclick="setGender('f')">FEMALE</button>
                </div>
            </div>
        </div>

        <textarea id="scriptInput" class="script-area" placeholder="Type Roman Urdu or English script here..."></textarea>
        
        <button id="mainBtn" class="generate-btn" onclick="generate()">GENERATE CRYSTAL CLEAR VOICE</button>
    </div>

    <div id="outputBox" class="output-card">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h5 class="m-0 text-success">Output Generated</h5>
            <a id="dlLink" href="#" download class="btn btn-outline-light btn-sm rounded-pill px-3">Download MP3</a>
        </div>
        <audio id="player" controls class="w-100 mt-2" style="filter: invert(1);"></audio>
    </div>
</div>

<script>
    let currentLang = "English";
    let currentGender = "m";

    function setLang(l) {
        currentLang = l;
        document.getElementById('lang-en').className = (l==='English' ? 'toggle-btn active' : 'toggle-btn');
        document.getElementById('lang-hi').className = (l==='Hindi' ? 'toggle-btn active' : 'toggle-btn');
    }

    function setGender(g) {
        currentGender = g;
        document.getElementById('gen-m').className = (g==='m' ? 'toggle-btn active' : 'toggle-btn');
        document.getElementById('gen-f').className = (g==='f' ? 'toggle-btn active' : 'toggle-btn');
    }

    async function generate() {
        const text = document.getElementById('scriptInput').value.trim();
        if(!text) return Swal.fire('Error', 'Please enter some text.', 'error');

        const btn = document.getElementById('mainBtn');
        btn.disabled = true;
        btn.innerText = "NEURAL PROCESSING...";

        try {
            const res = await fetch('/api/generate', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    text: text, 
                    voice_group: currentLang,
                    gender: currentGender
                })
            });
            const data = await res.json();
            
            if(data.url) {
                document.getElementById('outputBox').style.display = 'block';
                document.getElementById('player').src = data.url;
                document.getElementById('dlLink').href = data.url;
                document.getElementById('player').play();
                Swal.fire({ icon: 'success', title: 'Generated!', text: 'Voice is ready to play.', toast: true, position: 'top-end', showConfirmButton: false, timer: 3000 });
            }
        } catch(e) {
            Swal.fire('Error', 'Check your internet or backend.', 'error');
        } finally {
            btn.disabled = false;
            btn.innerText = "GENERATE CRYSTAL CLEAR VOICE";
        }
    }
</script>
</body>
</html>
