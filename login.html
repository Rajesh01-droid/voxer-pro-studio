<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Voxer AI Studio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        body { background: #ffffff; height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Inter', sans-serif; }
        .login-card { width: 100%; max-width: 400px; padding: 40px; border: 1px solid #f0f0f0; border-radius: 24px; text-align: center; }
        .logo-text { font-weight: 900; font-size: 2rem; letter-spacing: -1.5px; margin-bottom: 30px; color: #000; }
        .form-control { border-radius: 12px; padding: 12px 15px; background: #f9fafb; border: 1px solid #eee; margin-bottom: 15px; }
        .btn-login { background: #000; color: #fff; border: none; width: 100%; padding: 14px; border-radius: 12px; font-weight: 700; }
        .google-btn { margin-bottom: 25px; display: flex; justify-content: center; }
    </style>
</head>
<body>

<div class="login-card">
    <div class="logo-text">VOXER AI</div>
    
    <div id="g_id_onload" data-client_id="YOUR_GOOGLE_ID.apps.googleusercontent.com" data-callback="onGoogleSuccess"></div>
    <div class="g_id_signin google-btn" data-type="standard"></div>

    <div class="text-muted small mb-3">OR USE USERNAME</div>

    <input id="l_user" type="text" class="form-control" placeholder="Username">
    <input id="l_pass" type="password" class="form-control" placeholder="Password">
    <button onclick="handleLogin()" class="btn-login">Sign In</button>

    <p class="mt-4 text-muted small">
        New to Voxer? <a href="signup.html" class="text-black fw-bold text-decoration-none">Create Account</a>
    </p>
</div>

<script>
    async function handleLogin() {
        const fd = new FormData();
        fd.append('username', document.getElementById('l_user').value);
        fd.append('password', document.getElementById('l_pass').value);

        try {
            const r = await fetch('http://127.0.0.1:8080/api/login', { method: 'POST', body: fd });
            const d = await r.json();

            if(r.ok) {
                // User details save karein local storage mein
                localStorage.setItem('voxUser', d.username);
                localStorage.setItem('voxName', d.full_name);
                localStorage.setItem('voxPremium', d.is_premium);
                
                window.location.href = "index.html"; // Redirect to main studio
            } else {
                alert("Invalid Username or Password!");
            }
        } catch(e) {
            alert("Server Error!");
        }
    }

    function onGoogleSuccess(response) {
        const payload = JSON.parse(atob(response.credential.split('.')[1]));
        localStorage.setItem('voxUser', payload.given_name);
        window.location.href = "index.html";
    }
</script>

</body>
</html>
